<html>
  <head>
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="main.css" />
  </head>
  <body>
    <div class="main" id="main">
      <img class="imgCouvreChef" id="imgCouvreChef" onclick="clickChapeau(event)" src="Gemini_Generated_Image_k9cj3nk9cj3nk9cj-removebg-preview.png">
      <p class="compteur" id="compteur">0 Cook</p>
      <p class="compteurSec" id="compteurSec">0 Cook/sec </p>
    </div>
    <div class="buttunMenu" id="buttunMenu">
      <button class="but-menu settings" id="settings">Settings</button>
      <button class="but-menu succes" id="succes">Succes</button>
      <button class="but-menu skins" id="skins">Skins</button>
    </div>
    <div class="machine" id="machine">
      <div class="patesDiv" id="patesDiv">
        <button onclick="machineBuy('pates')" class="but-machine patesBut" id="patesBut"></button>
        <p class="patesP" id="patesP">Pates </p>
        <p class="patesPrix" id="patesPrix"> 100 Cook</p>
        <p class="patesCompt" id="patesCompt"> 0 Posseder</p>
      </div>
      <div class="rizDiv" id="rizDiv" style="display:none;">
        <button onclick="machineBuy('riz')" class="but-machine rizBut" id="rizBut"></button>
        <p class="rizP" id="rizP">Riz </p>
        <p class="rizPrix" id="rizPrix"> 1 k Cook</p>
        <p class="rizCompt" id="rizCompt"> 0 Posseder</p>
      </div>
      <div class="sauceDiv" id="sauceDiv" style="display:none;">
        <button onclick="machineBuy('sauce')" class="but-machine sauceBut" id="sauceBut"></button>
        <p class="sauceP" id="sauceP">Sauce </p>
        <p class="saucePrix" id="saucePrix"> 10 k Cook</p>
        <p class="sauceCompt" id="sauceCompt"> 0 Posseder</p>
      </div>
      <div class="saladeDiv" id="saladeDiv" style="display:none;">
        <button onclick="machineBuy('salade')" class="but-machine saladeBut" id="saladeBut"></button>
        <p class="saladeP" id="saladeP">Salade </p>
        <p class="saladePrix" id="saladePrix"> 100 k Cook</p>
        <p class="saladeCompt" id="saladeCompt"> 0 Posseder</p>
      </div>
      <div class="friteDiv" id="friteDiv" style="display:none;">
        <button onclick="machineBuy('frite')" class="but-machine friteBut" id="friteBut"></button>
        <p class="friteP" id="friteP">Frite </p>
        <p class="fritePrix" id="fritePrix"> 1 million Cook</p>
        <p class="friteCompt" id="friteCompt"> 0 Posseder</p>
      </div>
    </div>
  </body>
</html>
